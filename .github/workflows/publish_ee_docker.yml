name: Publish Chatwoot Docker images to GHCR

on:
  push:
    branches:
      - **
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Formatar nome da imagem para minúsculo
        run: |
          echo "IMAGE_ID=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Definir Edição do Chatwoot (EE)
        run: |
          echo -en '\nENV CW_EDITION="ee"' >> docker/Dockerfile

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Logar no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir e Publicar a Imagem Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_ID }}:latest
            ghcr.io/${{ env.IMAGE_ID }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
