en:
  super_admin:
    navigation:
      logo_alt: "ViperChat Admin Dashboard"
      console: "Super Admin Console"
      dashboard: "Dashboard"
      installation_configs: "Installation configuration"
      settings: "Settings"
      sidekiq_dashboard: "Sidekiq Dashboard"
      instance_health: "Instance Health"
      agent_dashboard: "Agent Dashboard"
      logout: "Logout"
    dashboard:
      title: "Admin Dashboard"
      accounts: "Accounts"
      users: "Users"
      inboxes: "Inboxes"
      conversations: "Conversations"
    app_configs:
      title: "Configure Settings - %{config}"
      true: "True"
      false: "False"
      submit: "Submit"
    instance_statuses:
      title: "Instance Status"
      metric: "Metric"
      value: "Value"
    settings:
      title: "Settings"
      subtitle: "Update your instance settings, access billing portal"
      alert:
        title: "Alert!"
        message: "Unauthorized premium changes detected in ViperChat. To keep using them, please upgrade your plan. Contact for help:"
      installation_identifier: "Installation Identifier"
      current_plan: "Current plan"
      refresh: "Refresh"
      manage: "Manage"
      license_warning: "You have %{count} agents. Please add more licenses to add more users."
      help:
        title: "Need help?"
        subtitle: "Do you face any issues? We are here to help."
        community_support: "Community Support"
        chat_support: "Chat Support"
      features: "Features"
      upgrade_now: "Upgrade now"
      switch_to_enterprise: "Switch to Enterprise edition"
    accounts:
      seed_data:
        description: "Click the button to generate seed data into this account for demos."
        warning: "Note: This will clear all the existing data in this account."
        submit: "Generate Seed Data"
      reset_cache:
        description_html: "This will clear the IndexedDB cache keys from redis.<br>The next load will fetch the data from backend."
        submit: "Reset Frontend Cache"
    users:
      impersonate:
        warning: "Caution: Any actions executed after impersonate will appear as if performed by the impersonated user - [%{name}]"
        button: "Impersonate user"
    auth:
      title: "SuperAdmin | %{brand}"
      greeting: "Howdy, admin"
      email_label: "Email Address"
      email_placeholder: "Email eg: someone@example.com"
      password_label: "Password"
      password_placeholder: "Password"
      login: "Login"
      invalid_credentials: "Invalid credentials. Please try again."
